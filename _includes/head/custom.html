{% include base_path %}

<!-- start custom head snippets -->

{% if page.portfolio_book %}
<link rel="stylesheet" href="{{ base_path }}/assets/css/portfolio-book.css" />
{% endif %}

{% if page.permalink == '/resume/' %}
<style>
  .resume-pdf-frame {
    width: 100%;
    margin: 1.25rem 0 2rem;
    border: 1px solid var(--global-border-color);
    border-radius: 4px;
    overflow: hidden;
    background: var(--global-thead-color);
  }
  .resume-pdf-frame iframe {
    display: block;
    width: 100%;
    height: min(1150px, 85vh);
    border: 0;
  }
</style>
{% endif %}

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<meta name="theme-color" content="#ffffff"/>

<!-- end custom head snippets -->
